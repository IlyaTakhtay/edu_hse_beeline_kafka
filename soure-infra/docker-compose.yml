services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.3.2.39-alpine
    container_name: clickhouse-server
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      - CLICKHOUSE_PASSWORD=your_secure_password
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - shared-network

  postgres:
    image: postgres:15
    container_name: beeline_postgres
    environment:
      POSTGRES_DB: beeline_db
      POSTGRES_USER: beeline_user
      POSTGRES_PASSWORD: beeline_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=10
      - -c
      - max_wal_senders=10
      
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beeline_user -d beeline_db"]
      interval: 10s
      timeout: 5s
      retries: 5
  
    networks:
      - shared-network

volumes:
  clickhouse_data:
  postgres_data:

networks:
    shared-network:
      name: shared-network
      driver: bridge
